<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoffeeHouse</title>
    <link rel="stylesheet" href="style.css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-container">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-icon">☕</div>
                <h1>Coffee<span>House</span></h1>
                <p>Faça login para continuar</p>
            </div>

            <!-- Formulário de Login -->
            <form id="formLogin">
                <div class="form-group">
                    <label for="loginUser">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="loginUser" placeholder="Digite seu usuário" autocomplete="username">
                    </div>
                    <span class="error-msg" id="errorUser"></span>
                </div>

                <div class="form-group">
                    <label for="loginPass">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPass" placeholder="Digite sua senha" autocomplete="current-password">
                    </div>
                    <span class="error-msg" id="errorPass"></span>
                </div>

                <button type="submit" class="btn-auth" id="btnLogin">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar
                </button>
            </form>

            <!-- Links -->
            <div class="links-area">
                <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
                <a href="index.html" class="back-home">
                    <i class="fa-solid fa-arrow-left"></i> Voltar para o início
                </a>
            </div>
        </div>
    </div>

    <!-- Toast para notificações -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="js/login.js"></script>
</body>
</html>
