<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CoffeeHouse</title>
    <link rel="stylesheet" href="style.css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="auth-page">
        <div class="auth-container">
    
            <div class="logo-area">
                <div class="logo-icon">☕</div>
                <h1>Coffee<span>House</span></h1>
                <p>Crie sua conta e comece a pedir</p>
            </div>

      
            <form id="formCadastro">
                <div class="form-group">
                    <label for="cadastroUser">Usuário</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="cadastroUser" placeholder="Escolha um nome de usuário" autocomplete="username">
                    </div>
                    <span class="error-msg" id="errorUser"></span>
                </div>

                <div class="form-group">
                    <label for="cadastroEmail">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="cadastroEmail" placeholder="Digite seu e-mail" autocomplete="email">
                    </div>
                    <span class="error-msg" id="errorEmail"></span>
                </div>

                <div class="form-group">
                    <label for="cadastroPass">Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="cadastroPass" placeholder="Crie uma senha (mínimo 6 caracteres)" autocomplete="new-password">
                        <button type="button" class="toggle-pass" id="togglePass">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <span class="strength-bar" id="strengthBar1"></span>
                        <span class="strength-bar" id="strengthBar2"></span>
                        <span class="strength-bar" id="strengthBar3"></span>
                        <span class="strength-text" id="strengthText">Fraca</span>
                    </div>
                    <span class="error-msg" id="errorPass"></span>
                </div>

                <div class="form-group">
                    <label for="cadastroConfirm">Confirmar Senha</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-check-circle"></i>
                        <input type="password" id="cadastroConfirm" placeholder="Confirme sua senha" autocomplete="new-password">
                    </div>
                    <span class="error-msg" id="errorConfirm"></span>
                </div>

                <div class="form-group">
                    <div class="termos-group">
                        <input type="checkbox" id="termosCheck">
                        <label for="termosCheck">
                            Li e aceito os <a href="#">Termos de Uso</a> e a 
                            <a href="#">Política de Privacidade</a>
                        </label>
                    </div>
                    <span class="error-checkbox" id="errorTermos"></span>
                </div>

                <button type="submit" class="btn-auth" id="btnCadastrar">
                    <i class="fa-solid fa-user-plus"></i> Criar Conta
                </button>
            </form>

            <div class="links-area">
                <p>Já tem conta? <a href="login.html">Faça login</a></p>
                <a href="index.html" class="back-home">
                    <i class="fa-solid fa-arrow-left"></i> Voltar para o início
                </a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>


    <script src="js/cadastro.js"></script>
</body>
</html>
