<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeHouse</title>
    <link rel="stylesheet" href="style.css/coffee.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- LAYOUT BIDIMENSIONAL: SIDEBAR + MAIN          -->
    <!-- ============================================ -->
    <div class="app-container">

        <!-- ========================================== -->
        <!-- COLUNA 1: PERFIL (SIDEBAR)                 -->
        <!-- ========================================== -->
        <aside class="sidebar" id="sidebar">
            
            <!-- Logo e nome da empresa -->
            <div class="perfil-header">
                <img src="assets/images/CoffeeHouse.png" alt="CoffeeHouse" class="logo-img" id="logoEmpresa">
                <h1 class="nome-empresa" id="nomeEmpresa">CoffeeHouse</h1>
            </div>

            <!-- Estatísticas -->
            <div class="perfil-stats">
                <div class="stat-item">
                    <span class="stat-label">Total de Pedidos</span>
                    <span class="stat-value" id="totalPedidos">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Valor Total</span>
                    <span class="stat-value" id="totalValor">R$ 0,00</span>
                </div>
            </div>

            <!-- Usuário logado (aparece só após login) -->
            <div class="perfil-usuario" id="perfilUsuario" style="display: none;">
                <hr>
                <div class="usuario-info">
                    <img src="assets/images/avatar-default.png" alt="Avatar" class="avatar-usuario" id="avatarUsuario">
                    <span class="usuario-nome" id="nomeUsuarioLogado">Usuário</span>
                </div>
                <div class="usuario-stats">
                    <div class="stat-item">
                        <span class="stat-label">Meus Pedidos</span>
                        <span class="stat-value" id="meusPedidos">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Gasto</span>
                        <span class="stat-value" id="meuGasto">R$ 0,00</span>
                    </div>
                </div>
            </div>

            <!-- Botão Pedir (habilitado só logado) -->
            <button class="btn-pedir" id="btnPedir" disabled>
                <i class="fa-solid fa-cart-plus"></i> Pedir
            </button>

            <!-- Botão Sair (aparece só logado) -->
            <button class="btn-sair" id="btnSair" style="display: none;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>

            <!-- Rodapé do perfil -->
            <footer class="sidebar-footer">
                <p class="footer-brand">CoffeeHouse</p>
                <div class="footer-social">
                    <img src="assets/images/Instagram.svg" alt="Instagram" class="social-icon">
                    <img src="assets/images/Twitter.svg" alt="Twitter" class="social-icon">
                    <img src="assets/images/TikTok.svg" alt="TikTok" class="social-icon">
                </div>
                <p class="footer-copy">Copyright-2024</p>
            </footer>
        </aside>

        <!-- ========================================== -->
        <!-- COLUNA 2: MAIN (CONTEÚDO PRINCIPAL)         -->
        <!-- ========================================== -->
        <main class="main-content">

            <!-- Cabeçalho com botão login/logout -->
            <header class="main-header">
                <div class="header-right">
                    <!-- Botão Login (deslogado) -->
                    <button class="btn-login" id="btnLogin">
                        <i class="fa-solid fa-user"></i> Login
                    </button>
                    <!-- Usuário logado -->
                    <div class="user-logged" id="userLogged" style="display: none;">
                        <span class="user-welcome">Olá, <strong id="welcomeUser">admin</strong></span>
                        <button class="btn-logout-header" id="btnLogoutHeader">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </button>
                    </div>
                </div>
            </header>

            <!-- Filtros -->
            <section class="filtros-section">
                <div class="filtros-container">
                    <button class="filtro-btn active" data-categoria="todos">Todos</button>
                    <button class="filtro-btn" data-categoria="café">Café</button>
                    <button class="filtro-btn" data-categoria="lanches">Lanches</button>
                    <button class="filtro-btn" data-categoria="sobremesas">Sobremesas</button>
                </div>
            </section>

            <!-- Lista de Produtos -->
            <section class="produtos-section">
                <div class="produtos-grid" id="produtosGrid">
                    <!-- Produtos serão carregados via JavaScript -->
                </div>
            </section>

            <!-- Paginação -->
            <section class="paginacao-section">
                <div class="paginacao-container">
                    <button class="page-btn" id="btnAnterior" disabled>
                        <i class="fa-solid fa-chevron-left"></i> Anterior
                    </button>
                    <div class="page-numbers" id="pageNumbers">
                        <!-- Gerado via JavaScript -->
                    </div>
                    <button class="page-btn" id="btnProximo">
                        Próximo <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </section>

        </main>
    </div>

    <!-- ============================================ -->
    <!-- MODAL LOGIN                                   -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="modalLogin">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fa-solid fa-mug-hot"></i> Login</h2>
                <button class="modal-close" id="modalClose">
                    <img src="assets/images/x.svg" alt="Fechar" class="close-icon">
                </button>
            </div>
            <form id="formLogin" class="modal-form">
                <div class="form-group">
                    <label for="loginUser">Usuário</label>
                    <input type="text" id="loginUser" placeholder="Digite seu usuário" class="form-input">
                    <span class="error-msg" id="errorUser"></span>
                </div>
                <div class="form-group">
                    <label for="loginPass">Senha</label>
                    <input type="password" id="loginPass" placeholder="Digite sua senha" class="form-input">
                    <span class="error-msg" id="errorPass"></span>
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MODAL PEDIDO                                  -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="modalPedido">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fa-solid fa-cart-shopping"></i> Meus Pedidos</h2>
                <button class="modal-close" id="modalPedidoClose">
                    <img src="assets/images/x.svg" alt="Fechar" class="close-icon">
                </button>
            </div>
            <form id="formPedido" class="modal-form">
                <div class="form-group">
                    <label for="pedidoProduto">Produto</label>
                    <select id="pedidoProduto" class="form-input">
                        <option value="">Selecione um produto</option>
                    </select>
                    <span class="error-msg" id="errorProduto"></span>
                </div>
                <div class="form-group">
                    <label for="pedidoQuantidade">Quantidade</label>
                    <input type="number" id="pedidoQuantidade" placeholder="Quantidade" min="1" value="1" class="form-input">
                    <span class="error-msg" id="errorQuantidade"></span>
                </div>
                <button type="submit" class="btn-entrar">Pedir</button>
            </form>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MODAL COMENTÁRIO                              -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="modalComentario">
        <div class="modal modal-comentario">
            <div class="modal-header">
                <h2><i class="fa-regular fa-comment"></i> Comentários</h2>
                <button class="modal-close" id="modalComentarioClose">
                    <img src="assets/images/x.svg" alt="Fechar" class="close-icon">
                </button>
            </div>
            <div class="comentarios-lista" id="comentariosLista">
                <!-- Comentários carregados via JavaScript -->
            </div>
            <div class="comentario-input-area">
                <input type="text" id="comentarioInput" placeholder="Escrever um comentário..." class="form-input">
                <button id="btnEnviarComentario">
                    <img src="assets/images/send.svg" alt="Enviar" class="send-icon">
                </button>
            </div>
            <span class="error-msg" id="errorComentario"></span>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
